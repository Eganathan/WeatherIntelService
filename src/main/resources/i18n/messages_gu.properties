# Spraying Safety
SPRAYING_HIGH_title=Do Not Spray \u2014 Unsafe Wind
SPRAYING_HIGH_description=Wind speed is outside the safe spraying range. Above 15 km/h causes spray drift onto non-target areas; below 2 km/h causes thermal inversion, keeping droplets suspended. Reschedule when wind is between 3\u201310 km/h.
SPRAYING_MEDIUM_title=Spray with Care \u2014 Borderline Wind
SPRAYING_MEDIUM_description=Wind speed is at the edge of the safe range. Use low-drift nozzles, reduce spray pressure, and stop if conditions change. Ideal window is 3\u201310 km/h.
SPRAYING_LOW_title=Safe to Spray \u2014 Wind Optimal
SPRAYING_LOW_description=Wind is within the ideal 3\u201310 km/h range for precise application. Good conditions to proceed.

# Chemical Efficacy
CHEMICAL_EFFICACY_HIGH_title=High Heat \u2014 Avoid Chemical Application
CHEMICAL_EFFICACY_HIGH_description=Temperature exceeds 32\u00b0C. Agrochemicals volatilise and degrade rapidly at this heat, significantly reducing field efficacy. Spray during early morning (before 9 AM) or after sunset.
CHEMICAL_EFFICACY_MEDIUM_title=Elevated Temperature \u2014 Reduced Efficacy
CHEMICAL_EFFICACY_MEDIUM_description=Temperature is between 28\u201332\u00b0C. Chemical breakdown is accelerated. For best results, apply in the early morning when temperatures are cooler.
CHEMICAL_EFFICACY_LOW_title=Good Conditions for Chemical Application
CHEMICAL_EFFICACY_LOW_description=Temperature is within the optimal range for chemical uptake and effectiveness. Proceed with planned applications.

# Fungal Risk
FUNGAL_RISK_HIGH_title=Critical Fungal Risk \u2014 Act Now
FUNGAL_RISK_HIGH_description=Humidity has exceeded 85% for 10 or more consecutive hours \u2014 a recognised threshold for rapid fungal disease development. Scout crops immediately for early signs of infection and consider a preventive fungicide application.
FUNGAL_RISK_MEDIUM_title=Elevated Fungal Risk \u2014 Monitor Closely
FUNGAL_RISK_MEDIUM_description=Humidity has risen above 70%. Conditions are conducive to early-stage fungal development. Inspect crops for lesions or discolouration, and ensure good canopy airflow.
FUNGAL_RISK_LOW_title=Low Fungal Risk
FUNGAL_RISK_LOW_description=Humidity is within safe limits. Disease pressure from fungal pathogens is low. No immediate action required.

# Field Workability
FIELD_WORKABILITY_HIGH_title=Fields Not Workable \u2014 Postpone Operations
FIELD_WORKABILITY_HIGH_description={0}% precipitation probability. High risk of soil saturation and waterlogging. Operating heavy machinery will cause severe soil compaction and surface damage. Postpone all field operations until soils drain and firm up.
FIELD_WORKABILITY_MEDIUM_title=Reduced Field Workability \u2014 Use Caution
FIELD_WORKABILITY_MEDIUM_description={0}% precipitation probability. Soils may be soft or partially saturated. Limit heavy machinery traffic to avoid compaction, and allow additional drying time before cultivation or harvesting.
FIELD_WORKABILITY_LOW_title=Good Field Workability
FIELD_WORKABILITY_LOW_description={0}% precipitation probability. Soil conditions are suitable for cultivation, sowing, spraying, or harvesting. Good window for field operations.

# Heat Stress
HEAT_STRESS_HIGH_title=Severe Heat Stress Risk \u2014 Irrigate Immediately
HEAT_STRESS_HIGH_description=Peak temperature {0}\u00b0C sustained above 38\u00b0C. Prolonged exposure causes pollen sterility, accelerated leaf senescence, and significant yield loss in most crops. Irrigate at once, and avoid field labour during peak afternoon hours.
HEAT_STRESS_MEDIUM_title=Moderate Heat Stress \u2014 Monitor Crops
HEAT_STRESS_MEDIUM_description=Peak temperature {0}\u00b0C. Watch for early heat stress symptoms: wilting, leaf rolling, or browning of leaf margins. Ensure adequate soil moisture and consider shade netting for sensitive or transplanted crops.
HEAT_STRESS_LOW_title=No Heat Stress
HEAT_STRESS_LOW_description=Peak temperature {0}\u00b0C. Temperatures are within safe limits for most field crops. No heat stress risk expected.

# Harvest Window
HARVEST_WINDOW_HIGH_title=No Harvest Window Found
HARVEST_WINDOW_HIGH_description=No suitable harvest window exists in this forecast period. Conditions are persistently wet, calm, or windy. Check the next forecast update before committing to harvest operations.
HARVEST_WINDOW_MEDIUM_title=Marginal Harvest Window
HARVEST_WINDOW_MEDIUM_description=A harvest window exists but conditions are not fully ideal \u2014 up to {0}% rain chance and/or wind outside the 3\u201315 km/h optimal range. Proceed with care and have contingency plans ready if conditions deteriorate.
HARVEST_WINDOW_LOW_title=Good Harvest Window
HARVEST_WINDOW_LOW_description=Conditions are well-suited for harvest. Rain chance is at most {0}%, wind is within the 3\u201315 km/h range, and daytime slots are available. Good window to proceed.

# Spraying Window
SPRAYING_WINDOW_HIGH_title=No Suitable Spraying Window
SPRAYING_WINDOW_HIGH_description=No forecast slot meets at least two of the four spray criteria (wind 3\u201310 km/h, temperature 15\u201328\u00b0C, humidity below 70%, precipitation below 30%). Wait for improved conditions and recheck the next forecast.
SPRAYING_WINDOW_MEDIUM_title=Marginal Spraying Window
SPRAYING_WINDOW_MEDIUM_description=Best available window: {0} km/h wind, {1}\u00b0C. Not all four spray criteria are fully met. Use low-drift nozzles, apply at low pressure, and monitor conditions during the operation.
SPRAYING_WINDOW_LOW_title=Ideal Spraying Window
SPRAYING_WINDOW_LOW_description=Optimal spraying conditions: {0} km/h wind, {1}\u00b0C. All four criteria are met \u2014 wind, temperature, humidity, and rain risk are all within the ideal range. Recommended window to spray.
